<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCK , PAPER & SCISSORS</title>
    <link rel="stylesheet" href="style.css">
</head> 
<body>
    
    <!--TODO:
    1. rules vala button add krna-->
    <!--Fixed header in all slides-->

    <div class="heading">
        <div class="logo">
           <img src="logo.svg">
        </div>   
        
        <div class="score">
            <p>SCORE</p>
            <h3><span id="score">0</span></h3>
        </div>
        
    </div>

    <div class="choice active" id="choice">
        
        <div class="paper-scissor">
            <div class="paper " id="paper" >
            <img  src="icon-paper.svg"> 
            </div>

            <div class="scissors" id="scissors">
            <img  src="icon-scissors.svg">
            </div>
        </div>

        <div class="rock" id="rock" >
            <img src="icon-rock.svg">
        </div>

       
    </div>


    <div class="compare" id="compare">
        <div class="your-picked">
            <h3>YOU PICKED</h3>
            <div id="user-div" >
            <span id="you-picked"></span>
            </div>
        </div>

        <div id="final-div">
            <h2><span id="final" ></span></h2>
        </div>
        <div class="computer-picked">
            <h3>THE HOUSE PICKED</h3>
            <div id="house-div">
            <span id="house-picked"></span>
            </div>
        </div>
    </div>

   
    <script src="script.js"></script>
</body>
</html>
